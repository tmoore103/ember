name: Refresh ticker data

on:
  schedule:
    # Mondays at 06:00 UTC (Sunday late evening Pacific). ETFs don't change daily,
    # so weekly is plenty and keeps Action minutes minimal.
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ticker data
        run: python scripts/fetch_ticker_data.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tickers.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh ticker data"
            git push
          fi
